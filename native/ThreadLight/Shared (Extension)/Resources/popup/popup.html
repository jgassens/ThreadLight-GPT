<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ThreadLight</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <h1>ThreadLight</h1>
        <p id="status-text" aria-live="polite">Local-only for ChatGPT tabs.</p>
      </header>

      <form id="settings-form" class="settings-form">
        <label class="switch-row">
          <span>Enable ThreadLight</span>
          <input id="enabled" type="checkbox" />
        </label>

        <label class="range-row" for="keep-last-turns">
          <span>Show last <strong id="keep-last-turns-value">20</strong> turns</span>
          <input id="keep-last-turns" type="range" min="5" max="100" step="1" />
        </label>

        <label class="switch-row">
          <span>Show status pill</span>
          <input id="show-status-pill" type="checkbox" />
        </label>

        <label class="switch-row">
          <span>Ultra lean mode</span>
          <input id="ultra-lean-mode" type="checkbox" />
        </label>

        <label class="switch-row">
          <span>Collapse long user messages</span>
          <input id="collapse-long-user-messages" type="checkbox" />
        </label>

        <button id="restore-full-thread" type="button">Restore full thread on next reload</button>
      </form>

      <footer class="popup-footer">
        <a href="#privacy" id="privacy-link">Privacy</a>
        <span id="version-text">Version 0.1.5</span>
        <span>Unofficial utility. Not affiliated with OpenAI.</span>
      </footer>
    </main>
    <script src="../dist/popup.js" defer></script>
  </body>
</html>
